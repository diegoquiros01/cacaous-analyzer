# netlify.toml — Performance & Cache Configuration

# ── Functions: extend timeout for Claude API calls (coherence can take 30-60s)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[functions."claude"]
  timeout = 60

# ── Images: cache 1 year (they don't change, versioned by filename if needed)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Fonts: cache 1 year
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML pages: no cache (always fresh so deploys take effect immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── JS/CSS: short cache (30 min) — safe for vanilla HTML with inline scripts
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=1800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=1800"

# ── Security headers (free performance win — avoids redirect chains)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ── Clean URLs — serve .html files without extension
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# ── Spanish (/es/) rewrites — serve same files, JS detects /es/ prefix
[[redirects]]
  from = "/es"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/es/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/es/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/es/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/es/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/es/*"
  to = "/:splat"
  status = 200
