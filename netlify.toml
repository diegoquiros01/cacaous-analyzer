# netlify.toml — Performance & Cache Configuration

# ── Images: cache 1 year (they don't change, versioned by filename if needed)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Fonts: cache 1 year
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML pages: no cache (always fresh so deploys take effect immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── JS/CSS: short cache (30 min) — safe for vanilla HTML with inline scripts
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=1800"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=1800"

# ── Security headers (free performance win — avoids redirect chains)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Redirects: www → apex (avoids double DNS lookup if using www as primary)
# Uncomment if you want docsvalidate.com to redirect to www.docsvalidate.com
# [[redirects]]
#   from = "https://docsvalidate.com/*"
#   to   = "https://www.docsvalidate.com/:splat"
#   status = 301
#   force  = true
